<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEE U - Member Approval</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #1B2B4B; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: white; border-radius: 20px; padding: 40px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.logo { background: #C9A84C; color: #1B2B4B; font-size: 20px; font-weight: 700; padding: 6px 16px; border-radius: 8px; letter-spacing: 2px; display: inline-block; margin-bottom: 24px; }
.icon { font-size: 56px; margin-bottom: 16px; }
h2 { color: #1B2B4B; font-size: 22px; font-weight: 600; margin-bottom: 8px; }
p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
.badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; margin: 16px 0; }
.badge.personal { background: #e8f5e9; color: #2e7d32; }
.badge.retail { background: #fff3e0; color: #e65100; }
.btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
.btn-approve { background: #1B2B4B; color: #C9A84C; }
.btn-approve:hover { background: #2C3E6B; }
.error { color: #e53935; font-size: 13px; margin-top: 12px; }
.loading { color: #999; font-size: 14px; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">SEE U</div>
  <div id="content">
    <div class="icon">⏳</div>
    <h2>Processing...</h2>
    <p class="loading">Please wait</p>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://zskpwhzpdmcnvkpknhvy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpza3B3aHpwZG1jbnZrcGtuaHZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NTI2NTcsImV4cCI6MjA5MzAyODY1N30.VROhU-Gs9ZejxN4oTRayYP91OZtaoKHTd1rOV1keKCw';
const ADMIN_TOKEN = 'seeu2024admin';

async function processApproval() {
  const params = new URLSearchParams(window.location.search);
  const id    = params.get('id');
  const type  = params.get('type');
  const token = params.get('token');
  const el    = document.getElementById('content');

  // 보안 체크
  if (!id || !type || token !== ADMIN_TOKEN) {
    el.innerHTML = `<div class="icon">❌</div><h2>Invalid Link</h2><p class="error">This approval link is invalid or expired.</p>`;
    return;
  }

  // 이미 승인됐는지 체크
  try {
    const check = await fetch(SUPABASE_URL + '/rest/v1/profiles?id=eq.' + id, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const data = await check.json();
    if (!data || !data[0]) {
      el.innerHTML = `<div class="icon">❌</div><h2>Member Not Found</h2><p class="error">This member account could not be found.</p>`;
      return;
    }
    const member = data[0];

    if (member.status === 'approved') {
      const typeBadge = member.type === 'retail' ? '<span class="badge retail">🏪 Retail (Wholesale)</span>' : '<span class="badge personal">👤 Personal</span>';
      el.innerHTML = `<div class="icon">✅</div><h2>Already Approved</h2>${typeBadge}<p><strong>${member.name}</strong> is already approved.</p>`;
      return;
    }

    // 승인 처리
    const res = await fetch(SUPABASE_URL + '/rest/v1/profiles?id=eq.' + id, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ status: 'approved', type: type })
    });

    if (res.ok) {
      const typeBadge = type === 'retail'
        ? '<span class="badge retail">🏪 Retail (Wholesale Price)</span>'
        : '<span class="badge personal">👤 Personal (Retail Price)</span>';
      el.innerHTML = `
        <div class="icon">🎉</div>
        <h2>Approved!</h2>
        <p><strong>${member.name}</strong> has been approved as:</p>
        ${typeBadge}
        <p style="margin-top:12px;color:#999;font-size:12px;">They can now log in and see prices.</p>
      `;
    } else {
      el.innerHTML = `<div class="icon">❌</div><h2>Error</h2><p class="error">Failed to approve. Please try again.</p>`;
    }
  } catch(e) {
    el.innerHTML = `<div class="icon">❌</div><h2>Error</h2><p class="error">Connection failed: ${e.message}</p>`;
  }
}

processApproval();
</script>
</body>
</html>
